global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "quantos-testnet-seed"
    static_configs:
      - targets: ["seed:9615"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "quantos-testnet-validator-1"
    static_configs:
      - targets: ["validator-1:9615"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "quantos-testnet-validator-2"
    static_configs:
      - targets: ["validator-2:9615"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "quantos-testnet-validator-3"
    static_configs:
      - targets: ["validator-3:9615"]
    metrics_path: "/metrics"
    scrape_interval: 10s

  - job_name: "quantos-testnet-validator-4"
    static_configs:
      - targets: ["validator-4:9615"]
    metrics_path: "/metrics"
    scrape_interval: 10s
