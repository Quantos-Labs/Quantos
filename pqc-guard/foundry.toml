[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
# WOTS verification does many keccak ops; allow generous gas in tests.
gas_limit = "18446744073709551615"
fs_permissions = [{ access = "read", path = "./" }]

[fuzz]
runs = 256

[profile.ci]
fuzz = { runs = 1000 }

[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
eth_sepolia = "${ETH_SEPOLIA_RPC_URL}"

[etherscan]
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }
